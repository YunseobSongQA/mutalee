name = "mutalee-cron"
main = "cron.js"
compatibility_date = "2024-09-23"

# 구독·규칙 저장과 정각 알람은 Durable Object(강한 일관성 + setAlarm)가 담당한다.
# 예전 KV(최종 일관성, 최대 60초 지연)는 더 이상 쓰지 않는다.
[[durable_objects.bindings]]
name = "SCHEDULER"
class_name = "MutaleeScheduler"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MutaleeScheduler"]

# 안전망: DO 알람이 유실돼도 1분 안에 복구 (실제 발송 시각은 DO 알람이 정각에 맞춘다)
[triggers]
crons = ["* * * * *"]
